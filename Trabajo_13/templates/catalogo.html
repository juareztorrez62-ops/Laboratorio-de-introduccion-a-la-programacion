<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo — CajaWalmart</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<header class="topbar">
    <div class="logo">
        <span class="logo-spark">★</span> CajaWalmart
    </div>
    <nav class="topnav">
        <a href="/" class="nav-link">🧾 Caja</a>
        <a href="/catalogo" class="nav-link active">📦 Catálogo</a>
    </nav>
</header>

<main class="container">

    <!-- Formulario agregar/editar -->
    <section class="left-panel">
        <div class="card">
            <h3 class="card-title" id="formTitulo">Agregar producto</h3>
            <div class="form-grid">
                <label>Código de barras / QR
                    <input id="fCodigo" type="text" placeholder="Ej: 7501055300018">
                </label>
                <label>Nombre del producto
                    <input id="fNombre" type="text" placeholder="Ej: Coca-Cola 600ml">
                </label>
                <label>Precio ($)
                    <input id="fPrecio" type="number" step="0.01" min="0" placeholder="Ej: 18.50">
                </label>
            </div>
            <div class="form-actions">
                <button class="btn btn-primary" onclick="guardarProducto()">💾 Guardar</button>
                <button class="btn btn-secondary" onclick="cancelarEdicion()" id="btnCancelar" style="display:none;">✖ Cancelar</button>
            </div>
            <p id="formMsg" class="form-msg" style="display:none;"></p>
        </div>
    </section>

    <!-- Lista del catálogo -->
    <section class="right-panel" style="flex:2;">
        <div class="card table-box">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                <h3 class="card-title" style="margin:0;">Productos en catálogo</h3>
                <input id="buscador" type="text" placeholder="🔍 Buscar..." style="width:200px;" oninput="filtrarTabla()">
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Código</th>
                        <th>Nombre</th>
                        <th>Precio</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaCatalogo"></tbody>
            </table>
            <p id="catalogoVacio" class="tabla-vacia" style="display:none;">No hay productos en el catálogo.</p>
        </div>
    </section>

</main>

<script src="{{ url_for('static', filename='js/catalogo.js') }}"></script>
</body>
</html>
